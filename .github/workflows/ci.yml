name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ '**' ]  # Run on all branches for early feedback

# Prevent concurrent runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Permissions for AI code review to post comments
permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v6
      if: success()
      with:
        files: ./coverage.out
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest  # Use latest version (v2.x) built with Go 1.25+
        args: --timeout=5m

  verify-gcp:
    name: Verify GCP Integration
    runs-on: ubuntu-latest
    # Only run if GCP secrets are available (skip on forks)
    if: |
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push') &&
      github.repository == 'Mawar2/Kaimi'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Verify Vertex AI API is enabled
      run: |
        gcloud services list \
          --enabled \
          --filter="name:aiplatform.googleapis.com" \
          --format="value(name)" \
          | grep -q "aiplatform.googleapis.com" \
          || (echo "::error::Vertex AI API is not enabled" && exit 1)

    - name: Verify Secret Manager access
      run: |
        gcloud secrets describe samgov-api-key \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          || (echo "::warning::samgov-api-key secret not found or not accessible" && exit 0)

    - name: Test service account permissions
      run: |
        echo "Testing IAM permissions..."
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          -H "Content-Type: application/json" \
          -d '{"permissions": ["aiplatform.endpoints.predict", "secretmanager.versions.access"]}' \
          "https://cloudresourcemanager.googleapis.com/v1/projects/${{ secrets.GCP_PROJECT_ID }}:testIamPermissions")
        
        echo "Permissions response: $RESPONSE"
        if ! echo "$RESPONSE" | jq -e '.permissions | contains(["aiplatform.endpoints.predict", "secretmanager.versions.access"])' > /dev/null; then
          echo "::warning::Service account may be missing required roles"
        else
          echo "✓ Service account has required permissions"
        fi

  verify-acceptance-criteria:
    name: Verify Acceptance Criteria
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Check PR references an issue
      uses: actions/github-script@v7
      with:
        script: |
          const prBody = context.payload.pull_request.body || '';
          const prTitle = context.payload.pull_request.title || '';
          const branchName = context.payload.pull_request.head.ref || '';

          // Check for issue reference in title, body, or branch name
          // Formats: #1, Fixes #1, Close #1, branch: 12_feature_name
          const issueInTextPattern = /#\d+/;
          const issueInBranchPattern = /^\d+_/;

          const hasIssueInText = issueInTextPattern.test(prBody) || issueInTextPattern.test(prTitle);
          const hasIssueInBranch = issueInBranchPattern.test(branchName);

          if (!hasIssueInText && !hasIssueInBranch) {
            core.setFailed(
              'PR must reference a GitHub Issue.\n' +
              'Include "#N" in title/body or use branch format "N_feature_name".\n' +
              'See WORKFLOW.md for requirements.'
            );
          } else {
            if (hasIssueInBranch) {
              const ticketNum = branchName.match(/^(\d+)_/)[1];
              core.info(`✓ PR linked to ticket #${ticketNum} (from branch name)`);
            } else {
              core.info('✓ PR references an issue in title or body');
            }
          }

  ai-code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      (github.event.pull_request.head.repo.full_name == github.repository) &&
      github.repository == 'Mawar2/Kaimi'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Get access token for Vertex AI
      id: auth
      run: |
        TOKEN=$(gcloud auth print-access-token)
        echo "::add-mask::$TOKEN"
        echo "access_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Get PR diff
      id: diff
      run: |
        git fetch origin ${{ github.base_ref }}
        git diff origin/${{ github.base_ref }}...HEAD > pr.diff

        # Escape for JSON and limit size
        DIFF=$(cat pr.diff | head -c 50000)
        echo "diff_size=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

    - name: AI Review with Gemini
      id: review
      run: |
        # Read diff and prepare prompt
        DIFF_TEXT=$(cat pr.diff | head -c 50000)

        # Build JSON payload using jq to properly escape everything
        PAYLOAD=$(jq -n \
          --arg diff "$DIFF_TEXT" \
          '{
            contents: [{
              role: "user",
              parts: [{
                text: "Review this PR diff. Report ONLY specific issues found. Skip introductions, summaries, and praise.\n\nFor each issue:\n- File path and line number\n- Category: Bug | Security | Performance | Best Practice | Test Coverage\n- Description and fix\n\nIf no issues: respond with only \"No issues found.\"\n\nPR Diff:\n\($diff)"
              }]
            }],
            generationConfig: {
              temperature: 0.2,
              maxOutputTokens: 8192
            }
          }')

        echo "Calling Vertex AI Gemini API..."
        RESPONSE=$(curl -s -X POST \
          "https://${{ secrets.GCP_REGION }}-aiplatform.googleapis.com/v1/projects/${{ secrets.GCP_PROJECT_ID }}/locations/${{ secrets.GCP_REGION }}/publishers/google/models/gemini-2.5-pro:generateContent" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
          -H 'Content-Type: application/json' \
          -d "$PAYLOAD")

        # Check for API errors
        if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
          echo "::error::Gemini API error: $(echo "$RESPONSE" | jq -r '.error.message')"
          echo "Full response: $RESPONSE"
          exit 1
        fi

        REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Error: No review generated"')

        if [ "$REVIEW" == "Error: No review generated" ]; then
          echo "::warning::No review text in response"
          echo "Response: $RESPONSE"
        fi

        echo "review<<EOF" >> $GITHUB_OUTPUT
        echo "$REVIEW" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Post review comment
      uses: actions/github-script@v7
      env:
        REVIEW_TEXT: ${{ steps.review.outputs.review }}
        DIFF_SIZE: ${{ steps.diff.outputs.diff_size }}
      with:
        script: |
          const review = process.env.REVIEW_TEXT;
          const diffSize = process.env.DIFF_SIZE;

          const body = "## 🤖 AI Code Review (Gemini 2.5 Pro)\n\n" +
                       review +
                       "\n\n---\n*Diff size: " + diffSize + " bytes | Reviewed by Gemini 2.5 Pro with thinking*";

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: body
          });

  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test, lint, verify-gcp, verify-acceptance-criteria, ai-code-review]
    if: always()

    steps:
    - name: Check all required jobs succeeded
      run: |
        # Test and lint are always required
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "::error::Tests failed"
          exit 1
        fi

        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "::error::Linting failed"
          exit 1
        fi

        # verify-gcp can be skipped (on forks or missing secrets) but not failed
        if [[ "${{ needs.verify-gcp.result }}" == "failure" ]]; then
          echo "::error::GCP verification failed"
          exit 1
        fi

        # verify-acceptance-criteria can be skipped (on direct push) but not failed
        if [[ "${{ needs.verify-acceptance-criteria.result }}" == "failure" ]]; then
          echo "::error::Acceptance criteria verification failed"
          exit 1
        fi

        # ai-code-review can be skipped (on forks, direct push, or missing secrets) but not failed
        if [[ "${{ needs.ai-code-review.result }}" != "success" && "${{ needs.ai-code-review.result }}" != "skipped" ]]; then
          echo "::error::AI code review failed"
          exit 1
        fi

        echo "✓ All required checks passed!"

  # Manual deployment to GCP (Phase 1+)
  # Requires manual approval via GitHub environment
  deploy-to-gcp:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [all-checks-pass]
    # Only run on main branch, after all checks pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://console.cloud.google.com/run?project=kaimi-seeker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for GCR
      run: |
        gcloud auth configure-docker us-east4-docker.pkg.dev

    # Phase 0: Placeholder deployment
    # Phase 1+: Uncomment the sections below to deploy Hunter to Cloud Run
    - name: Phase 0 - Deployment Placeholder
      run: |
        echo "========================================="
        echo "GCP Deployment - Phase 0"
