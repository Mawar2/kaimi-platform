name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ '**' ]  # Run on all branches for early feedback
    tags: [ 'release-*', 'v*' ]  # Release tags publish the central images (see publish-release-images)

# Prevent concurrent runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Permissions for AI code review to post comments
permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v6
      if: success()
      with:
        files: ./coverage.out
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2  # Pinned for reproducible lint (was 'latest' — nondeterministic staticcheck)
        args: --timeout=5m

  telemetry-core:
    name: Telemetry Core
    runs-on: ubuntu-latest
    # The sellable observability core (telemetry/) is a standalone nested module.
    # It must build, test, and lint INDEPENDENTLY and import ZERO Kaimi-domain
    # packages. That one-way dependency rule (host imports core, never the reverse)
    # is what keeps the module continuously extractable into its own repo. No GCP
    # secrets needed — this is pure local build/test, so it must always succeed.

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Build and test core (standalone)
      working-directory: telemetry
      run: |
        go build ./...
        go test -race ./...

    - name: Forbid Kaimi-domain imports
      working-directory: telemetry
      run: |
        if go list -deps ./... | grep -q 'github.com/Mawar2/Kaimi'; then
          echo "::error::telemetry/ imported a Kaimi-domain package — the core must stay domain-agnostic"
          exit 1
        fi
        echo "✓ core imports zero Kaimi packages"

    - name: Lint core
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2  # Pinned to match the root lint job
        working-directory: telemetry
        args: --timeout=5m

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    # govulncheck (official Go team scanner): known CVEs in dependencies, filtered to the
    # reachable call graph. INFORMATIONAL (continue-on-error): it queries the live
    # vuln.go.dev DB, which updates continuously, so a blocking gate would fail merges
    # whenever a new CVE is published even with no code change (and on transitive/stdlib
    # advisories outside this repo's control). It surfaces findings in the CI log; triage
    # them (bump the dep, like the x/net GO-2026-5026 fix) and promote to blocking once the
    # dependency baseline is clean and the toolchain is pinned.
    - name: govulncheck
      continue-on-error: true
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    # gosec static security analysis. Informational on initial rollout (continue-on-error)
    # so the pilot is not blocked by a flood of pre-existing findings; review the report and
    # promote to blocking once triaged. Excludes the Wails-embed-only cmd/desktop.
    - name: gosec
      continue-on-error: true
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec -severity medium -confidence medium -exclude-dir=cmd/desktop ./...

  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    # Pure static validation of the deploy/terraform module (WS-E1). It needs NO
    # GCP credentials: `terraform fmt`/`init -backend=false`/`validate` only parse
    # and type-check HCL — they never touch the cloud. This is the real check on
    # the Terraform module, since terraform was not installable in the build env
    # where the module was authored.

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8
        terraform_wrapper: false

    - name: Terraform fmt (check)
      run: terraform fmt -check -recursive deploy/terraform

    - name: Validate kaimi module
      run: |
        terraform -chdir=deploy/terraform/modules/kaimi init -backend=false -input=false
        terraform -chdir=deploy/terraform/modules/kaimi validate

    - name: Validate example env
      run: |
        terraform -chdir=deploy/terraform/envs/example init -backend=false -input=false
        terraform -chdir=deploy/terraform/envs/example validate

  verify-gcp:
    name: Verify GCP Integration
    runs-on: ubuntu-latest
    # Only run if GCP secrets are available (skip on forks)
    if: |
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push') &&
      github.repository == 'Mawar2/Kaimi'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Verify Vertex AI API is enabled
      run: |
        gcloud services list \
          --enabled \
          --filter="name:aiplatform.googleapis.com" \
          --format="value(name)" \
          | grep -q "aiplatform.googleapis.com" \
          || (echo "::error::Vertex AI API is not enabled" && exit 1)

    - name: Verify Secret Manager access
      run: |
        gcloud secrets describe samgov-api-key \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          || (echo "::warning::samgov-api-key secret not found or not accessible" && exit 0)

    - name: Test service account permissions
      run: |
        echo "Testing IAM permissions..."
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          -H "Content-Type: application/json" \
          -d '{"permissions": ["aiplatform.endpoints.predict", "secretmanager.versions.access"]}' \
          "https://cloudresourcemanager.googleapis.com/v1/projects/${{ secrets.GCP_PROJECT_ID }}:testIamPermissions")
        
        echo "Permissions response: $RESPONSE"
        if ! echo "$RESPONSE" | jq -e '.permissions | contains(["aiplatform.endpoints.predict", "secretmanager.versions.access"])' > /dev/null; then
          echo "::warning::Service account may be missing required roles"
        else
          echo "✓ Service account has required permissions"
        fi

  verify-acceptance-criteria:
    name: Verify Acceptance Criteria
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Informational only: surfaces whether a PR links an approved issue, but does NOT block
    # the merge (the team reviews ACs manually and merges agent-built PRs without a formal
    # ticket). continue-on-error keeps the check green; the step's findings stay in the log.
    continue-on-error: true

    steps:
    - name: Check PR references an issue
      uses: actions/github-script@v7
      with:
        script: |
          const prBody = context.payload.pull_request.body || '';
          const prTitle = context.payload.pull_request.title || '';
          const branchName = context.payload.pull_request.head.ref || '';

          // Check for issue reference in title, body, or branch name
          // Formats: #1, Fixes #1, Close #1, branch: 12_feature_name
          const issueInTextPattern = /#\d+/;
          const issueInBranchPattern = /^\d+_/;

          const hasIssueInText = issueInTextPattern.test(prBody) || issueInTextPattern.test(prTitle);
          const hasIssueInBranch = issueInBranchPattern.test(branchName);

          if (!hasIssueInText && !hasIssueInBranch) {
            // Informational only (not a hard gate): warn, do not fail the check. The team
            // reviews acceptance criteria manually and merges agent-built PRs without a
            // formal ticket. Re-tighten to core.setFailed if issue-per-PR is adopted.
            core.warning(
              'PR does not reference a GitHub Issue (informational, not blocking).\n' +
              'Include "#N" in title/body or use branch format "N_feature_name" if you want it linked.'
            );
          } else {
            if (hasIssueInBranch) {
              const ticketNum = branchName.match(/^(\d+)_/)[1];
              core.info(`✓ PR linked to ticket #${ticketNum} (from branch name)`);
            } else {
              core.info('✓ PR references an issue in title or body');
            }
          }

  ai-code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    outputs:
      review_json: ${{ steps.parse.outputs.review_json }}
      fixable_count: ${{ steps.parse.outputs.fixable_count }}
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (github.event.pull_request.head.repo.full_name == github.repository) &&
      github.repository == 'Mawar2/Kaimi'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Get access token for Vertex AI
      id: auth
      run: |
        TOKEN=$(gcloud auth print-access-token)
        echo "::add-mask::$TOKEN"
        echo "access_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Get PR diff
      id: diff
      run: |
        git fetch origin ${{ github.base_ref }}
        git diff origin/${{ github.base_ref }}...HEAD > pr.diff

        # Escape for JSON and limit size
        DIFF=$(cat pr.diff | head -c 50000)
        echo "diff_size=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

    - name: AI Review with Gemini
      id: review
      run: |
        # Read diff and prepare prompt
        DIFF_TEXT=$(cat pr.diff | head -c 50000)

        # Build JSON payload using jq to properly escape everything
        PAYLOAD=$(jq -n \
          --arg diff "$DIFF_TEXT" \
          '{
            contents: [{
              role: "user",
              parts: [{
                text: "Review this PR diff and respond with ONLY a JSON object (no markdown, no code blocks, just raw JSON).\n\nSchema:\n{\n  \"issues\": [\n    {\n      \"file\": \"path/to/file.go\",\n      \"line\": 42,\n      \"type\": \"Bug | Security | Performance | Best Practice | Test Coverage\",\n      \"severity\": \"high | medium | low\",\n      \"description\": \"Clear description of the issue\",\n      \"suggestedFix\": \"Specific fix recommendation\",\n      \"autoFixable\": true | false\n    }\n  ]\n}\n\nGuidelines:\n- Mark as autoFixable=true ONLY for simple, unambiguous fixes (unused vars, formatting, simple best practices)\n- Mark as autoFixable=false for complex changes requiring human judgment\n- If no issues found, return: {\"issues\": []}\n\nPR Diff:\n\($diff)"
              }]
            }],
            generationConfig: {
              temperature: 0.2,
              maxOutputTokens: 8192
            }
          }')

        echo "Calling Vertex AI Gemini API..."
        RESPONSE=$(curl -s -X POST \
          "https://${{ secrets.GCP_REGION }}-aiplatform.googleapis.com/v1/projects/${{ secrets.GCP_PROJECT_ID }}/locations/${{ secrets.GCP_REGION }}/publishers/google/models/gemini-2.5-pro:generateContent" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
          -H 'Content-Type: application/json' \
          -d "$PAYLOAD")

        # Check for API errors
        if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
          echo "::error::Gemini API error: $(echo "$RESPONSE" | jq -r '.error.message')"
          echo "Full response: $RESPONSE"
          exit 1
        fi

        REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Error: No review generated"')

        if [ "$REVIEW" == "Error: No review generated" ]; then
          echo "::warning::No review text in response"
          echo "Response: $RESPONSE"
        fi

        echo "review<<EOF" >> $GITHUB_OUTPUT
        echo "$REVIEW" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Parse review JSON
      id: parse
      env:
        REVIEW_TEXT: ${{ steps.review.outputs.review }}
      run: |
        # Extract JSON from response (remove any markdown code blocks if present)
        REVIEW_JSON=$(echo "$REVIEW_TEXT" | sed -n '/^{/,/^}/p' | head -n 1)

        # Validate JSON
        if ! echo "$REVIEW_JSON" | jq empty 2>/dev/null; then
          echo "::warning::Review response is not valid JSON, treating as plain text"
          # Fallback: create empty issues JSON
          REVIEW_JSON='{"issues":[]}'
        fi

        # Store JSON for auto-fix job
        echo "review_json<<EOF" >> $GITHUB_OUTPUT
        echo "$REVIEW_JSON" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Count auto-fixable issues
        FIXABLE_COUNT=$(echo "$REVIEW_JSON" | jq '[.issues[]? | select(.autoFixable == true)] | length')
        echo "fixable_count=$FIXABLE_COUNT" >> $GITHUB_OUTPUT
        echo "Found $FIXABLE_COUNT auto-fixable issues"

    - name: Post review comment
      uses: actions/github-script@v7
      env:
        REVIEW_JSON: ${{ steps.parse.outputs.review_json }}
        FIXABLE_COUNT: ${{ steps.parse.outputs.fixable_count }}
        DIFF_SIZE: ${{ steps.diff.outputs.diff_size }}
      with:
        script: |
          const reviewJson = JSON.parse(process.env.REVIEW_JSON);
          const fixableCount = process.env.FIXABLE_COUNT;
          const diffSize = process.env.DIFF_SIZE;

          let body = "## 🤖 AI Code Review (Gemini 2.5 Pro)\n\n";

          if (!reviewJson.issues || reviewJson.issues.length === 0) {
            body += "✅ **No issues found**\n\n";
          } else {
            body += `Found ${reviewJson.issues.length} issue(s):\n\n`;

            reviewJson.issues.forEach((issue, index) => {
              const autoFixBadge = issue.autoFixable ? " 🔧 *Auto-fixable*" : "";
              const severityEmoji = issue.severity === "high" ? "🔴" : issue.severity === "medium" ? "🟡" : "🟢";

              body += `### ${index + 1}. ${issue.type}${autoFixBadge}\n`;
              body += `${severityEmoji} **${issue.file}:${issue.line}**\n\n`;
              body += `${issue.description}\n\n`;
              if (issue.suggestedFix) {
                body += `**Suggested fix:** ${issue.suggestedFix}\n\n`;
              }
              body += "---\n\n";
            });

            if (fixableCount > 0) {
              body += `\n💡 **${fixableCount} issue(s) marked as auto-fixable** - the auto-fix bot will attempt to fix these automatically.\n\n`;
            }
          }

          body += `*Diff size: ${diffSize} bytes | Reviewed by Gemini 2.5 Pro with thinking*`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: body
          });

  auto-fix:
    name: Auto-Fix Issues
    runs-on: ubuntu-latest
    needs: ai-code-review
    # Only run if review found auto-fixable issues
    if: |
      needs.ai-code-review.outputs.fixable_count > 0 &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.repository == 'Mawar2/Kaimi'

    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Get access token
      id: auth
      run: |
        TOKEN=$(gcloud auth print-access-token)
        echo "::add-mask::$TOKEN"
        echo "access_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Generate and apply fixes
      id: apply_fixes
      env:
        REVIEW_JSON: ${{ needs.ai-code-review.outputs.review_json }}
        ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      run: |
        # Parse auto-fixable issues
        FIXABLE=$(echo "$REVIEW_JSON" | jq -c '[.issues[] | select(.autoFixable == true)]')
        ISSUE_COUNT=$(echo "$FIXABLE" | jq 'length')

        echo "Processing $ISSUE_COUNT auto-fixable issues..."

        # Track which files were fixed
        FIXED_FILES=""

        # For each fixable issue
        echo "$FIXABLE" | jq -c '.[]' | while read -r issue; do
          FILE=$(echo "$issue" | jq -r '.file')
          LINE=$(echo "$issue" | jq -r '.line')
          DESCRIPTION=$(echo "$issue" | jq -r '.description')
          SUGGESTED_FIX=$(echo "$issue" | jq -r '.suggestedFix')

          echo "Fixing: $FILE (line $LINE)"

          # Read file content
          if [ ! -f "$FILE" ]; then
            echo "::warning::File not found: $FILE"
            continue
          fi

          FILE_CONTENT=$(cat "$FILE")

          # Call Gemini to generate specific fix using printf for proper multi-line handling
          PROMPT=$(printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n%s' \
            "Fix this issue in the code. Return ONLY the complete fixed file content, no explanations, no markdown code blocks." \
            "File: $FILE" \
            "Issue at line $LINE: $DESCRIPTION" \
            "Suggested fix: $SUGGESTED_FIX" \
            "" \
            "Current file content:" \
            "$FILE_CONTENT")

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              contents: [{
                role: "user",
                parts: [{ text: $prompt }]
              }],
              generationConfig: {
                temperature: 0.1,
                maxOutputTokens: 8192
              }
            }')

          RESPONSE=$(curl -s -X POST \
            "https://${{ secrets.GCP_REGION }}-aiplatform.googleapis.com/v1/projects/${{ secrets.GCP_PROJECT_ID }}/locations/${{ secrets.GCP_REGION }}/publishers/google/models/gemini-2.5-pro:generateContent" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")

          # Check for API errors
          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "::warning::Gemini API error for $FILE: $(echo "$RESPONSE" | jq -r '.error.message')"
            continue
          fi

          FIXED_CODE=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if [ -z "$FIXED_CODE" ]; then
            echo "::warning::No fix generated for $FILE"
            continue
          fi

          # Apply fix (overwrite file)
          echo "$FIXED_CODE" > "$FILE"

          echo "✓ Fixed: $FILE (line $LINE)"
          FIXED_FILES="$FIXED_FILES $FILE"
        done

        # Store fixed files list for commit message
        echo "fixed_files=$FIXED_FILES" >> $GITHUB_OUTPUT

    - name: Commit and push fixes
      run: |
        git config user.name "Kaimi Auto-Fix Bot"
        git config user.email "bot@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

        # Check if there are changes to commit
        if git diff --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git add .
        git commit -m "AI auto-fix: Apply fixes from code review [skip ci]" -m "Co-Authored-By: Gemini 2.5 Pro <noreply@google.com>"

        # Push to PR branch
        git push origin ${{ github.event.pull_request.head.ref }}

    - name: Post summary comment
      uses: actions/github-script@v7
      env:
        REVIEW_JSON: ${{ needs.ai-code-review.outputs.review_json }}
      with:
        script: |
          const reviewJson = JSON.parse(process.env.REVIEW_JSON);
          const issues = reviewJson.issues.filter(i => i.autoFixable);

          const fixList = issues.map(i =>
            `- **${i.file}:${i.line}** (${i.type}): ${i.description}`
          ).join('\n');

          const body = [
            "## 🔧 Auto-Fix Bot",
            "",
            `Applied ${issues.length} automatic fix(es):`,
            "",
            fixList,
            "",
            "---",
            "*These fixes were automatically generated and applied by Gemini 2.5 Pro. Please review the changes before merging.*"
          ].join("\n");

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: body
          });

  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test, lint, telemetry-core, security-scan, terraform-lint, verify-gcp, verify-acceptance-criteria, ai-code-review, auto-fix]
    if: always()

    steps:
    - name: Check all required jobs succeeded
      run: |
        # Test, lint, and terraform-lint are always required
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "::error::Tests failed"
          exit 1
        fi

        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "::error::Linting failed"
          exit 1
        fi

        # telemetry-core runs on every PR/push with no secrets, so it must succeed.
        if [[ "${{ needs.telemetry-core.result }}" != "success" ]]; then
          echo "::error::Telemetry core build/test/import-guard failed"
          exit 1
        fi

        # terraform-lint runs on every PR/push with no secrets, so it must succeed.
        if [[ "${{ needs.terraform-lint.result }}" != "success" ]]; then
          echo "::error::Terraform validation failed"
          exit 1
        fi

        # security-scan (govulncheck blocking; gosec informational) runs with no
        # secrets on every PR/push, so it must succeed.
        if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
          echo "::error::Security scan (govulncheck/gosec) failed"
          exit 1
        fi

        # verify-gcp can be skipped (on forks or missing secrets) but not failed
        if [[ "${{ needs.verify-gcp.result }}" == "failure" ]]; then
          echo "::error::GCP verification failed"
          exit 1
        fi

        # verify-acceptance-criteria is INFORMATIONAL: it checks for a linked approved
        # issue, but the team reviews ACs manually and merges agent-built PRs without a
        # formal ticket. The hard merge gate is tests + lint + security + terraform above.
        # A failure (e.g. a PR with no linked issue) warns but does NOT block the merge.
        if [[ "${{ needs.verify-acceptance-criteria.result }}" == "failure" ]]; then
          echo "::warning::Acceptance-criteria check did not pass (informational; not blocking the merge)"
        fi

        # ai-code-review can be skipped (on forks, draft PRs, direct push, or missing secrets) but not failed
        if [[ "${{ needs.ai-code-review.result }}" != "success" && "${{ needs.ai-code-review.result }}" != "skipped" ]]; then
          echo "::error::AI code review failed"
          exit 1
        fi

        # auto-fix can be skipped (if no fixable issues, on forks, draft PRs, direct push, or missing secrets) but not failed
        if [[ "${{ needs.auto-fix.result }}" != "success" && "${{ needs.auto-fix.result }}" != "skipped" ]]; then
          echo "::error::Auto-fix failed"
          exit 1
        fi

        echo "✓ All required checks passed!"

  # Central release registry — the source-of-truth images a NEW customer is
  # provisioned from (scripts/provision-customer.sh copies these into each
  # customer's own Artifact Registry repo). This builds the api + pipeline images
  # ONCE and pushes them to a CENTRAL repo in BlueMeta's project (kaimi-seeker),
  # SEPARATE from the per-tenant `kaimi` repo the dogfood deploy-to-gcp job uses,
  # so this is purely ADDITIVE — it does not touch or break the dogfood deploy.
  #
  #   Central repo:  us-east4-docker.pkg.dev/kaimi-seeker/kaimi-release
  #   Images:        .../kaimi-release/api        .../kaimi-release/pipeline
  #   Tags:          <git-sha> (immutable, what a customer pins)
  #                  latest    (moving pointer to newest main build)
  #                  <tag>     (the release tag name, when triggered by a tag push)
  #
  # Runs on push to main and on release tags (release-*, v*). The repo + region
  # live under BlueMeta's kaimi-seeker project; GCP_RELEASE_PROJECT overrides the
  # project via secret if the central registry ever moves, defaulting to the
  # dogfood GCP_PROJECT_ID so nothing breaks if that secret is unset.
  publish-release-images:
    name: Publish Central Release Images
    runs-on: ubuntu-latest
    needs: [all-checks-pass]
    # Opt-in via the RELEASE_PUBLISH repository variable (Settings → Variables).
    # Set it to 'true' AFTER adding the GCP_SA_KEY + GCP_PROJECT_ID secrets, so the
    # job only runs when it can actually authenticate (a missing secret would fail
    # the build). Unset/false → skips cleanly, keeping CI green.
    if: |
      always() &&
      needs.all-checks-pass.result == 'success' &&
      vars.RELEASE_PUBLISH == 'true' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/release-') || startsWith(github.ref, 'refs/tags/v'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Resolve central registry coordinates
      id: reg
      run: |
        # The central release repo lives in BlueMeta's project. Default to the
        # dogfood project (GCP_PROJECT_ID = kaimi-seeker) so this works with the
        # existing secrets; GCP_RELEASE_PROJECT can override it later if desired.
        RELEASE_PROJECT="${{ secrets.GCP_RELEASE_PROJECT }}"
        if [ -z "$RELEASE_PROJECT" ]; then RELEASE_PROJECT="${{ secrets.GCP_PROJECT_ID }}"; fi
        REGION="${{ secrets.GCP_REGION }}"
        REPO="kaimi-release"
        BASE="${REGION}-docker.pkg.dev/${RELEASE_PROJECT}/${REPO}"
        echo "release_project=$RELEASE_PROJECT" >> "$GITHUB_OUTPUT"
        echo "region=$REGION" >> "$GITHUB_OUTPUT"
        echo "repo=$REPO" >> "$GITHUB_OUTPUT"
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        echo "Central release base: $BASE"

    - name: Ensure central Artifact Registry repo exists (idempotent)
      run: |
        gcloud artifacts repositories describe "${{ steps.reg.outputs.repo }}" \
          --project="${{ steps.reg.outputs.release_project }}" \
          --location="${{ steps.reg.outputs.region }}" >/dev/null 2>&1 \
        || gcloud artifacts repositories create "${{ steps.reg.outputs.repo }}" \
          --project="${{ steps.reg.outputs.release_project }}" \
          --location="${{ steps.reg.outputs.region }}" \
          --repository-format=docker \
          --description="Kaimi central release images (source of truth for per-customer provisioning)"

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker "${{ steps.reg.outputs.region }}-docker.pkg.dev" --quiet

    - name: Compute image tags
      id: tags
      run: |
        SHA="${{ github.sha }}"
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        # When triggered by a tag push, also publish the human-readable tag name.
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "reltag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        else
          echo "reltag=" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push pipeline image (central)
      run: |
        IMG="${{ steps.reg.outputs.base }}/pipeline"
        EXTRA=()
        if [ -n "${{ steps.tags.outputs.reltag }}" ]; then EXTRA=(-t "${IMG}:${{ steps.tags.outputs.reltag }}"); fi
        docker build -f cmd/pipeline/Dockerfile \
          -t "${IMG}:${{ steps.tags.outputs.sha }}" \
          -t "${IMG}:latest" \
          "${EXTRA[@]}" \
          .
        docker push "${IMG}:${{ steps.tags.outputs.sha }}"
        docker push "${IMG}:latest"
        if [ -n "${{ steps.tags.outputs.reltag }}" ]; then docker push "${IMG}:${{ steps.tags.outputs.reltag }}"; fi

    - name: Build and push api image (central)
      run: |
        IMG="${{ steps.reg.outputs.base }}/api"
        EXTRA=()
        if [ -n "${{ steps.tags.outputs.reltag }}" ]; then EXTRA=(-t "${IMG}:${{ steps.tags.outputs.reltag }}"); fi
        docker build -f cmd/api/Dockerfile \
          -t "${IMG}:${{ steps.tags.outputs.sha }}" \
          -t "${IMG}:latest" \
          "${EXTRA[@]}" \
          .
        docker push "${IMG}:${{ steps.tags.outputs.sha }}"
        docker push "${IMG}:latest"
        if [ -n "${{ steps.tags.outputs.reltag }}" ]; then docker push "${IMG}:${{ steps.tags.outputs.reltag }}"; fi

    - name: Publish summary
      run: |
        BASE="${{ steps.reg.outputs.base }}"
        echo "Published central release images (provision a customer from these):"
        echo "  ${BASE}/api:${{ steps.tags.outputs.sha }}      (+ :latest${{ steps.tags.outputs.reltag && format(' + :{0}', steps.tags.outputs.reltag) || '' }})"
        echo "  ${BASE}/pipeline:${{ steps.tags.outputs.sha }} (+ :latest${{ steps.tags.outputs.reltag && format(' + :{0}', steps.tags.outputs.reltag) || '' }})"

  # Manual deployment to GCP (Phase 1+)
  # Requires manual approval via GitHub environment
  deploy-to-gcp:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [all-checks-pass]
    # Only run on main branch, after all checks pass.
    # always() is required: on push events the PR-only jobs upstream of
    # all-checks-pass (ai-code-review, auto-fix) are skipped, which makes the
    # implicit success() false and silently skips this job (seen on the #127
    # merge). Gate explicitly on all-checks-pass succeeding instead.
    # Opt-in via the ENABLE_CI_DEPLOY repository variable. CI auto-deploy is OFF by
    # default: the productized model provisions customers with scripts/provision-customer.sh,
    # and the dogfood is deployed manually — so a main merge must NOT auto-deploy (and would
    # fail here anyway with no GCP_SA_KEY). Set the var to 'true' (and the GCP secrets) only
    # if you want continuous deploy of a specific environment.
    if: |
      always() &&
      needs.all-checks-pass.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      vars.ENABLE_CI_DEPLOY == 'true'
    environment:
      name: production
      # NOTE: environment.url cannot reference the `secrets` context (GitHub
      # rejects the whole workflow at startup — "invalid workflow file"). Use a
      # static console URL; the deploy job itself still uses secrets.* in steps.
      url: https://console.cloud.google.com/run

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

    # One-time infrastructure (Artifact Registry repo "kaimi", the queue GCS
    # bucket, the kaimi-pipeline Cloud Run Job + kaimi-api Cloud Run Service with
    # their GCS volume mounts + Secret Manager wiring, and the Cloud Scheduler
    # trigger) is provisioned per-tenant by deploy/terraform (WS-E1).
    # This job only builds the new images and points the existing Cloud Run
    # resources at them. All registry/region/project references are tenant-neutral
    # via secrets (GCP_PROJECT_ID, GCP_REGION) — no hardcoded project or region.
    - name: Build and push pipeline image
      run: |
        PIPELINE_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kaimi/pipeline"
        docker build \
          -f cmd/pipeline/Dockerfile \
          -t "${PIPELINE_IMAGE}:${{ github.sha }}" \
          -t "${PIPELINE_IMAGE}:latest" \
          .
        docker push "${PIPELINE_IMAGE}:${{ github.sha }}"
        docker push "${PIPELINE_IMAGE}:latest"

    - name: Build and push api image
      run: |
        API_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kaimi/api"
        docker build \
          -f cmd/api/Dockerfile \
          -t "${API_IMAGE}:${{ github.sha }}" \
          -t "${API_IMAGE}:latest" \
          .
        docker push "${API_IMAGE}:${{ github.sha }}"
        docker push "${API_IMAGE}:latest"

    - name: Update Cloud Run Job (kaimi-pipeline)
      run: |
        gcloud run jobs update kaimi-pipeline \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kaimi/pipeline:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }}

    - name: Update Cloud Run Service (kaimi-api)
      run: |
        gcloud run services update kaimi-api \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kaimi/api:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }}

    - name: Deployment summary
      run: |
        echo "Deployed kaimi-pipeline (Cloud Run Job) image ${{ github.sha }}."
        echo "Deployed kaimi-api (Cloud Run Service) image ${{ github.sha }}."
        echo "Scheduled runs: 07:00 / 12:00 / 17:00 America/New_York (Cloud Scheduler job: kaimi-pipeline-schedule)."
